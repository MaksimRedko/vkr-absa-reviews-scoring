yamlversion: "1.0-provisional"
language: "ru"
notes: |
  Provisional vocabulary assembled from aspect concepts documented in
  SentiRuEval-2015/2016, ROMIP-2012, and RuSentiment-2018 aspect schemas.
  Formal extraction procedure is scheduled as separate deliverable.
  This file MUST be regenerated through the formal procedure before thesis defence.

aspects:
  # ============== GENERAL (12) ==============
