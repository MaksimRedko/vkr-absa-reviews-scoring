    canonical_name: "Качество"
    synonyms: ["качество", "качественный", "исполнение", "изготовление", "сделано", "сделан", "брак"]
    level: "general"
    domains: ["all"]
    hypothesis_template: "В этом отзыве обсуждается качество"

  - id: price
    canonical_name: "Цена"
    synonyms: ["цена", "стоимость", "дорогой", "дешёвый", "ценник", "переплата", "дорого", "дёшево"]
